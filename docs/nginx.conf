# =============================================================================
# Multi-tenant SaaS over a single ant-ui build (Option C: nginx site-key inject)
# -----------------------------------------------------------------------------
# One static ant-ui `dist` build serves many tenants. nginx resolves the tenant
# from the request (dedicated domain | subdomain | URL slug), looks up that
# tenant's keeper guest site key, and injects it into index.html via sub_filter
# as `window.__TENANT_SITE_KEY__`. The SPA reads that global instead of the
# build-time VITE_GUEST_SITE_KEY, exchanges it at keeper POST /guest-keys/auth
# for a guest JWT, then talks to ant's order-intake listener.
#
# Onboarding a client = add ONE line to the tenant table below + reload nginx.
# See docs/ONBOARDING.md.
#
# NOTE: the site key (gk_...) is publishable — safe to expose in HTML. Tenant
# isolation lives in the keeper guest-key record (app_id/division_id baked into
# the minted guest JWT claims), NOT in nginx.
# =============================================================================

http {
    # --- gzip: nginx re-compresses the sub_filter-patched HTML to the client.
    #     Only HTML is patched; /assets/ bundles are served untouched (full gzip
    #     + long cache via their own location below). Perf impact ~nil.
    gzip       on;
    gzip_types text/html;

    # -------------------------------------------------------------------------
    # helper 1 — extract the first path segment (used only by the shared slug
    #            host, e.g. shop.com/<slug>). Harmless for host-mode tenants.
    # -------------------------------------------------------------------------
    map $uri $slug {
        ~^/(?<s>[^/]+)   $s;
        default          "";
    }

    # -------------------------------------------------------------------------
    # helper 2 — choose the lookup key:
    #   * a shared path host (shop.com) resolves tenant by URL slug
    #   * every other host (dedicated domain / subdomain) resolves by $host
    # Add a line here ONLY when introducing a NEW shared slug host (rare —
    # this is infra, not per-tenant).
    # -------------------------------------------------------------------------
    map $host $lookup {
        shop.com   $slug;     # path mode  → shop.com/<slug>
        default    $host;     # dedicated domain + subdomain key on host
    }

    # =========================================================================
    # THE SINGLE TENANT TABLE
    # Onboarding = add ONE line here, keyed by the tenant's mode:
    #   dedicated domain : acme.com         gk_...;
    #   subdomain        : acme.shop.com    gk_...;
    #   slug             : acme             gk_...;   (served at shop.com/acme)
    # Value = the keeper guest site key (gk_...) minted for that tenant.
    # =========================================================================
    map $lookup $site_key {
        acme.com         gk_acme_REPLACE_ME;       # example: dedicated domain
        bravo.shop.com   gk_bravo_REPLACE_ME;      # example: subdomain
        carl             gk_carl_REPLACE_ME;       # example: slug (shop.com/carl)
        default          "";                       # unknown tenant → 404
    }
    # =========================================================================

    # -------------------------------------------------------------------------
    # Reusable inject block. Included by every tenant-serving location.
    # (Inline here; if you prefer, move to /etc/nginx/snippets/inject-sitekey.conf
    #  and `include` it.)
    # -------------------------------------------------------------------------
    #   gzip_static off;   -> never serve a precompressed .gz (sub_filter can't
    #                         patch compressed bytes)
    #   sub_filter_once on -> replace only the first </head>
    #   Cache-Control no-store -> tenant-specific HTML must never be cached

    # =========================================================================
    # SERVER BLOCK — all three modes flow through this one block.
    # Certs may force you to split into multiple server{} blocks (a dedicated
    # domain cert vs the *.shop.com wildcard). That's fine: maps are http-level
    # and shared across every server block, so the one-line onboarding promise
    # still holds. Subdomain mode needs a *.shop.com wildcard TLS cert.
    # =========================================================================
    server {
        listen      443 ssl;
        server_name acme.com *.shop.com shop.com;   # cover all modes

        # ssl_certificate     /etc/nginx/ssl/...;
        # ssl_certificate_key /etc/nginx/ssl/...;

        root  /var/www/ant-ui;   # the ant-ui `dist` output
        index index.html;

        # Static bundles: long cache, NOT injected, full gzip. Slug-independent
        # (absolute /assets/... refs work at any path/host).
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Everything else: serve index.html (SPA + deep-link fallback) with the
        # tenant site key injected.
        location / {
            if ($site_key = "") { return 404; }   # unknown tenant → clean fail

            gzip_static off;
            sub_filter '</head>'
                '<script>window.__TENANT_SITE_KEY__="$site_key";</script></head>';
            sub_filter_once on;
            add_header Cache-Control "no-store" always;

            try_files $uri /index.html;
        }
    }

    # Optional: redirect plain HTTP → HTTPS
    server {
        listen      80;
        server_name acme.com *.shop.com shop.com;
        return 301  https://$host$request_uri;
    }
}
